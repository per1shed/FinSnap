services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finsnap}
      POSTGRES_USER: ${POSTGRES_USER:-finsnap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finsnap} -d ${POSTGRES_DB:-finsnap}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # Именованный том: данные БД сохраняются между перезапусками (docker compose down без -v)
  postgres_data:
    name: finsnap_postgres_data
    driver: local
